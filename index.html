
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pośrednictwo AI PRO | Tomasz Hajduk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #05070a; --card: rgba(22, 27, 42, 0.9); }
        body { background: var(--bg); color: #e5e7eb; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; height: 100vh; }
        
        .tab-content { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .card { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 15px; }
        .sidebar-item-active { background: linear-gradient(90deg, var(--accent), transparent) !important; border-left: 4px solid var(--accent); color: white !important; }
        
        /* EFEKT ZATRZĘSIENIA (SHAKE) */
        @keyframes shake-anim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-active { animation: shake-anim 0.4s ease-in-out; }

        #lead-alert { display: none; position: fixed; top: 80px; right: 20px; z-index: 9999; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        
        .terminal-stream { font-size: 9px; color: #10b981; line-height: 1.2; overflow: hidden; height: 100%; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen" id="main-body">

    <div id="lead-alert" class="card border-orange-500 bg-orange-950/90 w-72">
        <p class="text-[10px] font-black text-orange-400 uppercase mb-2 italic">🔥 PRZYCHODZĄCE ZLECENIE</p>
        <p id="lead-name" class="text-[11px] mb-3 text-white font-bold">Inicjalizacja...</p>
        <button onclick="catchLead()" class="w-full py-2 bg-orange-500 text-black text-[10px] font-black rounded uppercase">Przejmij Kontrakt</button>
    </div>

    <aside class="w-full md:w-72 bg-black/95 md:p-6 flex flex-col border-r border-white/5 shrink-0 h-full">
        <div class="mb-8 hidden md:block text-center">
            <div class="text-xl font-black text-white tracking-tighter uppercase italic">Tomasz<br>Hajduk</div>
            <div class="text-[8px] text-blue-500 mt-2 font-bold uppercase">PROJEKTANT AI 2026</div>
        </div>
        <nav class="flex flex-col gap-2 flex-grow">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn flex items-center gap-4 p-4 rounded-xl sidebar-item-active text-[10px] font-bold uppercase">📊 Dashboard</button>
            <button onclick="switchTab('shop')" id="btn-shop" class="nav-btn flex items-center gap-4 p-4 rounded-xl text-gray-500 text-[10px] font-bold uppercase">🛒 Sklep AI</button>
            <button onclick="switchTab('products')" id="btn-products" class="nav-btn flex items-center gap-4 p-4 rounded-xl text-gray-500 text-[10px] font-bold uppercase">📦 Zasoby</button>
            <button onclick="switchTab('market')" id="btn-market" class="nav-btn flex items-center gap-4 p-4 rounded-xl text-gray-500 text-[10px] font-bold uppercase">📈 Giełda</button>
            <div class="mt-auto pt-6 border-t border-white/5 flex flex-col gap-2 mb-12">
                <button onclick="exportCertificate()" class="w-full py-3 bg-emerald-600/20 border border-emerald-500/50 rounded-xl text-[9px] font-black text-emerald-400 uppercase">🖨️ PDF Certyfikat</button>
                <button onclick="resetSystem()" class="w-full py-3 bg-red-600/20 border border-red-500/50 rounded-xl text-[9px] font-black text-red-400 uppercase">💥 Reset Systemu</button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 relative flex flex-col overflow-hidden">
        <header class="p-4 md:p-6 flex justify-between items-center bg-black/40 border-b border-white/5 z-40">
            <div>
                <div class="text-xs font-black text-white uppercase">Pośrednictwo AI PRO</div>
                <div class="text-[8px] text-blue-400 uppercase italic">Tomasz Hajduk // System v2.7</div>
            </div>
            <div class="text-[9px] font-bold text-emerald-400 font-mono border border-emerald-500/30 px-3 py-1 rounded-full uppercase">Status: Online</div>
        </header>

        <div class="flex-1 relative overflow-hidden">
            <section id="content-dashboard" class="tab-content active">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">
                    <div class="card border-l-4 border-emerald-500"><p class="text-[8px] text-emerald-500 uppercase">Saldo</p><p id="stat-balance" class="text-lg font-bold">0</p></div>
                    <div class="card border-l-4 border-blue-500"><p class="text-[8px] text-blue-400 uppercase">Aktywa</p><p id="stat-assets" class="text-lg font-bold">0</p></div>
                    <div class="card border-l-4 border-purple-500"><p class="text-[8px] text-purple-400 uppercase">Zysk/s</p><p id="stat-income" class="text-lg font-bold">0</p></div>
                    <div class="card border-l-4 border-orange-500"><p class="text-[8px] text-orange-400 uppercase">Leady</p><p id="stat-leads-count" class="text-lg font-bold">0</p></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2">
                        <div class="card h-[400px] flex flex-col border-t-2 border-blue-500 overflow-hidden">
                            <div class="text-blue-400 font-black text-[10px] uppercase mb-4 italic">Terminal Operacyjny</div>
                            <div class="relative h-[120px] w-full bg-black/50 rounded-lg p-3 border border-white/5 overflow-hidden mb-4 shrink-0">
                                <div id="terminal-stream" class="terminal-stream"></div>
                            </div>
                            <div class="flex-1 overflow-y-auto custom-scrollbar" id="system-logs"></div>
                        </div>
                    </div>
                    <div class="lg:col-span-1">
                        <div class="card h-[400px] border-t-2 border-emerald-500 flex flex-col justify-around p-6">
                            <button onclick="openModal('partner-modal')" class="w-full py-5 bg-blue-600/10 border border-blue-500/50 rounded-lg text-[10px] font-black text-blue-400 uppercase">Podpisz Umowę 🤝</button>
                            <button onclick="openModal('product-modal')" class="w-full py-5 bg-emerald-600/10 border border-emerald-500/50 rounded-lg text-[10px] font-black text-emerald-400 uppercase">Dodaj Zasób 📦</button>
                            <button onclick="openModal('transfer-modal')" class="w-full py-5 bg-purple-600/10 border border-purple-500/50 rounded-lg text-[10px] font-black text-purple-400 uppercase">Przelej Środki 💸</button>
                        </div>
                    </div>
                </div>
            </section>
            <section id="content-shop" class="tab-content"><div id="shop-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></section>
            <section id="content-products" class="tab-content"><div id="list-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></section>
            <section id="content-market" class="tab-content"><div id="market-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></section>
        </div>
    </main>

    <!-- MODALE -->
    <div id="transfer-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="card w-full max-w-md border-purple-500">
            <h3 class="text-purple-400 font-black mb-4 uppercase text-xs italic">Dyspozycja Przelewu</h3>
            <input type="text" id="bank-account" placeholder="Numer konta" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <button onclick="executeTransfer()" class="w-full bg-purple-600 py-3 rounded text-[10px] font-black text-white uppercase">Realizuj</button>
            <button onclick="closeModal('transfer-modal')" class="w-full mt-2 text-[8px] text-gray-500 uppercase">Zamknij</button>
        </div>
    </div>

    <div id="partner-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="card w-full max-w-md border-blue-500">
            <h3 class="text-blue-400 font-black mb-4 uppercase text-xs italic">Nowa Umowa B2B</h3>
            <input type="text" id="p-name" placeholder="Nazwa Podmiotu" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <input type="number" id="p-commission" placeholder="Zysk (PLN/s)" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <button onclick="savePartner()" class="w-full bg-blue-600 py-3 rounded text-[10px] font-black text-white uppercase">Podpisz</button>
            <button onclick="closeModal('partner-modal')" class="w-full mt-2 text-[8px] text-gray-500 uppercase">Anuluj</button>
        </div>
    </div>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="card w-full max-w-md border-emerald-500">
            <h3 class="text-emerald-400 font-black mb-4 uppercase text-xs italic">Dodaj Nowy Zasób</h3>
            <input type="text" id="pr-name" placeholder="Nazwa Zasobu" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <input type="number" id="pr-price" placeholder="Koszt" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <input type="number" id="pr-income" placeholder="Zysk/s" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <button onclick="saveQuickProduct()" class="w-full bg-emerald-600 py-3 rounded text-[10px] font-black text-white uppercase">Aktywuj</button>
            <button onclick="closeModal('product-modal')" class="w-full mt-2 text-[8px] text-gray-500 uppercase">Anuluj</button>
        </div>
    </div>

    <script>
        const LS_KEY = 'hajduk_v27_final_save';
        let currentLead = null;
        let leadsCaught = 0;

        const shopItems = [
            { id: 'n1', name: 'Bot Arbitrażowy', price: 15000, icon: '🤖', income: 30 },
            { id: 'q1', name: 'Węzeł Kwantowy', price: 120000, icon: '⚛️', income: 280 },
            { id: 's1', name: 'AI Sentinel V3', price: 750000, icon: '🛡️', income: 1500 },
            { id: 'a1', name: 'Neural Nexus', price: 2500000, icon: '🧠', income: 6000 },
            { id: 'a2', name: 'Cyber-Doradca', price: 8000000, icon: '📊', income: 22000 },
            { id: 'a3', name: 'Sztuczna Inteligencja OMEGA', price: 25000000, icon: '🌌', income: 85000 }
        ];

        const stockItems = [
            { id: 'TLA', name: 'TESLA AI', icon: '🚗', price: 610, fluctuation: 0.08 },
            { id: 'NVDA', name: 'NVIDIA RTX', icon: '🧠', price: 980, fluctuation: 0.12 },
            { id: 'PLTR', name: 'PALANTIR', icon: '👁️', price: 345, fluctuation: 0.06 }
        ];

        function triggerShake() {
            const body = document.getElementById('main-body');
            body.classList.add('shake-active');
            setTimeout(() => body.classList.remove('shake-active'), 400);
        }

        function getData() { return JSON.parse(localStorage.getItem(LS_KEY)) || [{ name:'RDZEŃ SYSTEMU', income:150, currentPrice:10000, icon:'💎' }]; }
        function saveData(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }
        function getBal() { return parseFloat(localStorage.getItem(LS_KEY + '_BAL')) || 50000; }
        function setBal(v) { localStorage.setItem(LS_KEY + '_BAL', v.toFixed(2)); }
        function getOwnedStocks() { return JSON.parse(localStorage.getItem(LS_KEY + '_STK')) || {}; }
        function saveOwnedStocks(s) { localStorage.setItem(LS_KEY + '_STK', JSON.stringify(s)); }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function addLog(m, c = 'text-blue-400/60') { 
            const l = document.getElementById('system-logs'); 
            if(l) { l.innerHTML = `<div class="${c} mb-1 border-l-2 border-current pl-2 text-[8px] font-bold uppercase">>> ${m}</div>` + l.innerHTML; }
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`content-${id}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-item-active'));
            document.getElementById(`btn-${id}`).classList.add('sidebar-item-active');
            updateUI();
        }

        function updateUI() {
            const d = getData(); const bal = getBal(); const owned = getOwnedStocks();
            document.getElementById('stat-balance').innerText = Math.floor(bal).toLocaleString() + " PLN";
            document.getElementById('stat-assets').innerText = Math.floor(d.reduce((s, i) => s + (i.currentPrice || 0), 0)).toLocaleString() + " PLN";
            document.getElementById('stat-income').innerText = d.reduce((s, i) => s + i.income, 0).toLocaleString() + " /s";
            document.getElementById('stat-leads-count').innerText = leadsCaught;
            
            document.getElementById('market-list').innerHTML = stockItems.map(s => `<div class="card border-t-2 border-blue-500"><div class="flex justify-between mb-2"><span class="text-xl">${s.icon}</span><span class="text-[9px] font-black uppercase">${s.name}</span></div><div class="text-lg font-bold">${Math.floor(s.price)} PLN</div><div class="text-[7px] text-gray-500 mb-4 italic">PORTFEL: ${owned[s.id] || 0}</div><div class="flex gap-2"><button onclick="tradeStock('${s.id}', 'buy')" class="flex-1 py-2 bg-emerald-600/20 border border-emerald-500 text-[8px] font-black uppercase">Kup</button><button onclick="tradeStock('${s.id}', 'sell')" class="flex-1 py-2 bg-red-600/20 border border-red-500 text-[8px] font-black uppercase">Sprzedaj</button></div></div>`).join('');
            document.getElementById('shop-list').innerHTML = shopItems.map(p => `<div class="card flex flex-col justify-between border-t-2 ${bal >= p.price ? 'border-emerald-500' : 'border-red-900 opacity-60'}"><div><div class="text-3xl mb-2">${p.icon}</div><div class="text-[10px] font-black uppercase">${p.name}</div><div class="text-[8px] text-gray-500">+${p.income} PLN/s</div></div><button onclick="buyProduct('${p.id}')" class="mt-4 w-full py-2 border rounded text-[9px] font-black uppercase ${bal >= p.price ? 'border-emerald-500 bg-emerald-500/10' : 'border-gray-800'}">${p.price.toLocaleString()} PLN</button></div>`).join('');
            document.getElementById('list-container').innerHTML = d.map(i => `<div class="card text-center border-b border-blue-500/20 p-4"><div class="text-3xl mb-2">${i.icon}</div><div class="text-[10px] font-black uppercase">${i.name}</div><div class="text-[8px] text-blue-400 mt-2">${i.income} PLN/s</div></div>`).join('');
        }

        function tradeStock(id, type) {
            const stock = stockItems.find(s => s.id === id);
            let owned = getOwnedStocks();
            if (type === 'buy' && getBal() >= stock.price) {
                setBal(getBal() - stock.price);
                owned[id] = (owned[id] || 0) + 1;
                addLog(`GIEŁDA: KUPNO ${id}`, "text-emerald-400");
            } else if (type === 'sell' && (owned[id] || 0) > 0) {
                setBal(getBal() + stock.price);
                owned[id] -= 1;
                addLog(`GIEŁDA: SPRZEDAŻ ${id}`, "text-orange-400");
            }
            saveOwnedStocks(owned); updateUI();
        }

        function buyProduct(id) { 
            const p = shopItems.find(x => x.id === id); 
            if (getBal() >= p.price) { 
                const d = getData(); setBal(getBal() - p.price); 
                d.push({ ...p, currentPrice: p.price }); saveData(d); 
                addLog(`SKLEP: ZAKUP ${p.name}`, "text-emerald-400 font-bold"); updateUI(); 
            } 
        }

        function savePartner() {
            const n = document.getElementById('p-name').value, c = parseFloat(document.getElementById('p-commission').value);
            if (n && c > 0) {
                const d = getData(); d.push({ name: n.toUpperCase(), income: c, icon: '🤝', currentPrice: 0 });
                saveData(d); addLog(`UMOWA: ${n}`, "text-blue-400"); closeModal('partner-modal'); updateUI();
            }
        }

        function saveQuickProduct() {
            const n = document.getElementById('pr-name').value, p = parseFloat(document.getElementById('pr-price').value), i = parseFloat(document.getElementById('pr-income').value);
            if (n && i > 0 && getBal() >= p) {
                const d = getData(); setBal(getBal() - p); d.push({ name: n.toUpperCase(), income: i, icon: '📦', currentPrice: p });
                saveData(d); addLog(`ZASÓB: DODANO ${n}`, "text-emerald-400"); closeModal('product-modal'); updateUI();
            }
        }

        function executeTransfer() {
            const amt = getBal(); setBal(0);
            triggerShake();
            addLog(`PRZELEW: ${Math.floor(amt)} PLN`, "text-purple-400 font-bold");
            closeModal('transfer-modal'); updateUI();
        }

        function catchLead() { 
            if(currentLead) { 
                triggerShake();
                const d = getData(); d.push({ name: `LEAD: ${currentLead.name}`, income: currentLead.income, icon: '🔥', currentPrice: 0 }); 
                saveData(d); leadsCaught++; document.getElementById('lead-alert').style.display = 'none'; 
                addLog("PRZEJĘTO LEAD!", "text-orange-400 font-bold"); currentLead = null; updateUI(); 
            } 
        }

        setInterval(() => {
            let d = getData(); setBal(getBal() + d.reduce((s, i) => s + i.income, 0));
            stockItems.forEach(s => s.price *= (1 + (Math.random() - 0.5) * s.fluctuation));
            updateUI();
            
            if (Math.random() < 0.025 && !currentLead) {
                const names = ["ORACLE CLOUD", "SPACEX CORE", "TESLA GRID", "UBER NEURAL"];
                currentLead = { name: names[Math.floor(Math.random()*names.length)], income: Math.floor(Math.random()*400)+150 };
                document.getElementById('lead-name').innerText = `${currentLead.name} (+${currentLead.income} /s)`;
                document.getElementById('lead-alert').style.display = 'block';
                setTimeout(() => { document.getElementById('lead-alert').style.display = 'none'; currentLead = null; }, 6000);
            }
        }, 1000);

        function resetSystem() { if(confirm("CZYŚCIĆ SYSTEM?")) { triggerShake(); localStorage.clear(); location.reload(); } }

        function exportCertificate() {
            const b = Math.floor(getBal()), i = getData().reduce((s, x) => s + x.income, 0);
            const date = new Date().toLocaleDateString();
            const w = window.open('', '_blank');
            w.document.write(`<html><head><style>body{background:#05070a;color:white;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}.cert{border:10px double #3b82f6;padding:60px;text-align:center;background:#0a0f1d;max-width:600px;}h1{color:#3b82f6;text-transform:uppercase;}.val{font-size:24px;color:#10b981;font-weight:bold;}.btn{background:#3b82f6;color:white;padding:15px 30px;border:none;cursor:pointer;font-weight:bold;margin-top:30px;}</style></head><body><div class="cert"><p style="color:#3b82f6;">OFFICIAL AUTHENTICATION // 2026</p><h1>CERTYFIKAT OPERATORA AI</h1><h2 style="font-size:32px;">TOMASZ HAJDUK</h2><hr style="border:1px solid #1e293b;margin:30px 0;"><p>SALDO: <span class="val">${b.toLocaleString()} PLN</span></p><p>WYDAJNOŚĆ: <span class="val">${i.toLocaleString()} PLN/s</span></p><button class="btn" onclick="window.print()">DRUKUJ PDF</button></div></body></html>`);
            w.document.close();
        }

        window.onload = () => { 
            updateUI(); 
            addLog("SYSTEM HAJDUK v2.7 ZAŁADOWANY."); 
            const stream = document.getElementById('terminal-stream');
            setInterval(() => {
                const l = document.createElement('div'); l.innerText = `> SYNC_DATA_NODE_${Math.random().toString(16).slice(2,6).toUpperCase()}... OK`;
                stream.prepend(l); if(stream.childNodes.length > 8) stream.removeChild(stream.lastChild);
            }, 3000);
        };
    </script>
</body>
</html>
