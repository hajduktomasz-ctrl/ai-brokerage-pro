
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Brokerage PRO | Tomasz Hajduk</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        :root { --accent: #3b82f6; --bg: #05070a; --card: rgba(22, 27, 42, 0.9); }
        body { background: var(--bg); color: #e5e7eb; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; height: 100vh; }
        .tab-content { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .tab-content.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 16px; padding: 15px; }
        .sidebar-item-active { background: linear-gradient(90deg, var(--accent), transparent) !important; border-left: 4px solid var(--accent); color: white !important; }
        #lead-alert { display: none; position: fixed; top: 80px; right: 20px; z-index: 9999; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .ticker-wrap { position: fixed; bottom: 0; width: 100%; overflow: hidden; background: rgba(0,0,0,0.9); border-top: 1px solid #f97316; z-index: 100; height: 30px; }
        .ticker { display: inline-block; white-space: nowrap; animation: ticker 40s linear infinite; color: #f97316; font-size: 10px; line-height: 30px; font-weight: bold; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        #system-logs { display: flex; flex-direction: column; gap: 4px; padding: 12px; }
        .log-entry { background: rgba(59, 130, 246, 0.03); padding: 8px 12px; border-radius: 6px; border-left: 3px solid #3b82f6; font-size: 9px; line-height: 1.4; display: flex; gap: 8px; }
        .log-success { border-color: #10b981; color: #34d399; }
        .log-alert { border-color: #f97316; color: #fb923c; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen" id="main-body">

    <div id="lead-alert" class="card border-orange-500 bg-orange-950/90 w-72">
        <p class="text-[10px] font-black text-orange-400 uppercase mb-1 italic">🔥 NOWY LEAD AI</p>
        <p id="lead-name" class="text-[11px] mb-3 text-white font-bold italic">Skanowanie...</p>
        <button onclick="catchLead()" class="w-full py-2 bg-orange-500 text-black text-[10px] font-black rounded uppercase">Przejmij</button>
    </div>

    <aside class="sidebar w-full md:w-72 bg-black md:p-6 flex flex-col border-r border-white/5 shrink-0">
        <div class="mb-8 hidden md:block text-center">
            <div class="text-xl font-black text-white tracking-tighter uppercase italic">Tomasz Hajduk</div>
            <div class="text-[8px] text-blue-500 mt-2 font-bold uppercase tracking-widest">Operator AI 2026</div>
        </div>
        <nav class="flex flex-col gap-2 flex-grow">
            <button onclick="switchTab('dashboard')" id="btn-dashboard" class="nav-btn flex items-center gap-4 p-4 rounded-xl sidebar-item-active text-[10px] font-bold uppercase">📊 Dashboard</button>
            <button onclick="switchTab('shop')" id="btn-shop" class="nav-btn flex items-center gap-4 p-4 rounded-xl text-gray-500 text-[10px] font-bold uppercase">🛒 Sklep AI</button>
            <button onclick="switchTab('products')" id="btn-products" class="nav-btn flex items-center gap-4 p-4 rounded-xl text-gray-500 text-[10px] font-bold uppercase">📦 Zasoby</button>
            <button onclick="switchTab('market')" id="btn-market" class="nav-btn flex items-center gap-4 p-4 rounded-xl text-gray-500 text-[10px] font-bold uppercase">📈 Giełda</button>
            <div class="mt-auto pt-6 border-t border-white/5 flex flex-col gap-2 mb-12">
                <button onclick="activatePrestige()" class="w-full py-3 bg-purple-600/20 border border-purple-500/50 rounded-xl text-[9px] font-black text-purple-400 uppercase italic">💎 PRESTIŻ</button>
                <button onclick="resetSystem()" class="w-full py-3 bg-red-600/20 border border-red-500/50 rounded-xl text-[9px] font-black text-red-400 uppercase italic">💥 RESET</button>
            </div>
        </nav>
    </aside>

    <main class="flex-1 relative flex flex-col overflow-hidden">
        <header class="p-4 md:p-6 flex justify-between items-center bg-black/40 border-b border-white/5 z-40">
            <div>
                <div class="text-xs font-black text-white uppercase tracking-tighter">AI Brokerage System</div>
                <div class="text-[8px] text-blue-400 font-bold italic">User: Hajduk // Mult: <span id="ui-multiplier">1.0</span>x</div>
            </div>
            <div class="text-[9px] font-bold text-emerald-400 font-mono border border-emerald-500/30 px-3 py-1 rounded-full uppercase">Status: Online</div>
        </header>

        <div class="flex-1 relative overflow-hidden">
            <section id="content-dashboard" class="tab-content active">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                    <div class="card border-l-4 border-emerald-500"><p class="text-[8px] text-emerald-500 uppercase">Saldo</p><p id="stat-balance" class="text-lg font-bold text-white">0 PLN</p></div>
                    <div class="card border-l-4 border-blue-500"><p class="text-[8px] text-blue-400 uppercase">Zasoby</p><p id="stat-assets" class="text-lg font-bold text-white">0</p></div>
                    <div class="card border-l-4 border-purple-500"><p class="text-[8px] text-purple-400 uppercase">Zysk/s</p><p id="stat-income" class="text-lg font-bold text-white">0 PLN</p></div>
                    <div class="card border-l-4 border-orange-500"><p class="text-[8px] text-orange-400 uppercase">Leady</p><p id="stat-leads-count" class="text-lg font-bold text-white">0</p></div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2">
                        <div class="card h-[450px] flex flex-col border-t-2 border-blue-500 p-0 overflow-hidden">
                            <div id="system-logs" class="flex-1 overflow-y-auto custom-scrollbar"></div>
                        </div>
                    </div>
                    <div class="lg:col-span-1 flex flex-col gap-4">
                        <button onclick="openModal('partner-modal')" class="card bg-blue-600/10 border-blue-500/50 text-[10px] font-black uppercase text-blue-400">Podpisz Umowę</button>
                        <button onclick="openModal('product-modal')" class="card bg-emerald-600/10 border-emerald-500/50 text-[10px] font-black uppercase text-emerald-400">Dodaj Zasób</button>
                        <button onclick="openModal('transfer-modal')" class="card bg-purple-600/10 border-purple-500/50 text-[10px] font-black uppercase text-purple-400">Przelej Środki</button>
                    </div>
                </div>
            </section>
            <section id="content-shop" class="tab-content"><div id="shop-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></section>
            <section id="content-products" class="tab-content"><div id="list-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></section>
            <section id="content-market" class="tab-content"><div id="market-list" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div></section>
        </div>
    </main>

    <div id="transfer-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="card w-full max-w-md border-purple-500 text-center">
            <h3 class="text-purple-400 font-black mb-4 uppercase text-xs">Przelew Środków</h3>
            <button onclick="executeTransfer()" class="w-full bg-purple-600 py-3 rounded text-[10px] font-black text-white uppercase">Wypłać wszystko</button>
            <button onclick="closeModal('transfer-modal')" class="mt-4 text-[8px] text-gray-500 uppercase">Anuluj</button>
        </div>
    </div>

    <div id="partner-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="card w-full max-w-md border-blue-500">
            <input type="text" id="p-name" placeholder="Firma" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <input type="number" id="p-commission" placeholder="Przychód/s" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <button onclick="savePartner()" class="w-full bg-blue-600 py-3 rounded text-[10px] font-black text-white uppercase tracking-widest">Podpisz</button>
            <button onclick="closeModal('partner-modal')" class="w-full mt-2 text-[8px] text-gray-500 uppercase">Anuluj</button>
        </div>
    </div>

    <div id="product-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="card w-full max-w-md border-emerald-500">
            <input type="text" id="pr-name" placeholder="Nazwa" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <input type="number" id="pr-price" placeholder="Koszt" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <input type="number" id="pr-income" placeholder="Zysk/s" class="w-full bg-black border border-white/10 p-3 text-[10px] rounded text-white mb-4">
            <button onclick="saveQuickProduct()" class="w-full bg-emerald-600 py-3 rounded text-[10px] font-black text-white uppercase tracking-widest">Aktywuj</button>
            <button onclick="closeModal('product-modal')" class="w-full mt-2 text-[8px] text-gray-500 uppercase">Anuluj</button>
        </div>
    </div>

    <div class="ticker-wrap"><div class="ticker">>>> SYSTEM HAJDUK v2.8 // GIEŁDA: LIVE // USER: TOMASZ HAJDUK // SYNCING NODES...</div></div>

    <script>
        const LS_KEY = 'hajduk_v28_final';
        let currentLead = null;
        let leadsCaught = parseInt(localStorage.getItem(LS_KEY + '_LC')) || 0;
        let prestigeMultiplier = parseFloat(localStorage.getItem(LS_KEY + '_MULT')) || 1.0;

        const shopItems = [
            { id: 'n1', name: 'Bot Arbitrażowy', price: 15000, icon: '🤖', income: 30 },
            { id: 'q1', name: 'Węzeł Kwantowy', price: 120000, icon: '⚛️', income: 280 },
            { id: 's1', name: 'AI Sentinel V3', price: 750000, icon: '🛡️', income: 1500 },
            { id: 'a3', name: 'AI GOD-MODE', price: 50000000, icon: '🌌', income: 150000 }
        ];

        let stockItems = [
            { id: 'TSLA', name: 'TESLA AI', icon: '🚗', price: 620, fluctuation: 0.06 },
            { id: 'NVDA', name: 'NVIDIA RTX', icon: '🧠', price: 950, fluctuation: 0.08 },
            { id: 'PLTR', name: 'PALANTIR', icon: '👁️', price: 340, fluctuation: 0.04 }
        ];

        function getData() { return JSON.parse(localStorage.getItem(LS_KEY)) || [{ name:'RDZEŃ', income:120, currentPrice:0, icon:'💎' }]; }
        function saveData(d) { localStorage.setItem(LS_KEY, JSON.stringify(d)); }
        function getBal() { return parseFloat(localStorage.getItem(LS_KEY + '_BAL')) || 50000; }
        function setBal(v) { localStorage.setItem(LS_KEY + '_BAL', v.toFixed(2)); }
        function getOwnedStocks() { return JSON.parse(localStorage.getItem(LS_KEY + '_STK')) || {}; }
        function saveOwnedStocks(s) { localStorage.setItem(LS_KEY + '_STK', JSON.stringify(s)); }

        function addLog(m, type = 'log-info') { 
            const l = document.getElementById('system-logs'); 
            const time = new Date().toLocaleTimeString();
            l.innerHTML = `<div class="log-entry ${type}"><span class="opacity-30">[${time}]</span> ${m}</div>` + l.innerHTML;
            if(l.children.length > 30) l.lastElementChild.remove();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`content-${id}`).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-item-active'));
            document.getElementById(`btn-${id}`).classList.add('sidebar-item-active');
            updateUI();
        }

        function updateUI() {
            const d = getData();
            const bal = getBal();
            const mult = prestigeMultiplier;
            const incomePerSec = d.reduce((s, i) => s + i.income, 0) * mult;

            document.getElementById('stat-balance').innerText = Math.floor(bal).toLocaleString() + " PLN";
            document.getElementById('stat-assets').innerText = d.length;
            document.getElementById('stat-income').innerText = incomePerSec.toFixed(1) + " PLN";
            document.getElementById('stat-leads-count').innerText = leadsCaught;
            document.getElementById('ui-multiplier').innerText = mult.toFixed(2);

            const owned = getOwnedStocks();
            document.getElementById('market-list').innerHTML = stockItems.map(s => `
                <div class="card border-t-2 border-orange-500/40">
                    <div class="flex justify-between mb-2"><span class="text-xl">${s.icon}</span><span class="text-[10px] font-black text-orange-400">${s.name}</span></div>
                    <div class="text-lg font-bold">${Math.floor(s.price)} PLN</div>
                    <div class="text-[8px] text-gray-500 uppercase mb-4">W portfelu: ${owned[s.id] || 0}</div>
                    <div class="flex gap-2">
                        <button onclick="tradeStock('${s.id}', 'buy')" class="flex-1 py-2 bg-emerald-500/10 border border-emerald-500/50 text-[8px] font-black uppercase rounded">Kup</button>
                        <button onclick="tradeStock('${s.id}', 'sell')" class="flex-1 py-2 bg-red-500/10 border border-red-500/50 text-[8px] font-black uppercase rounded">Sprzedaj</button>
                    </div>
                </div>`).join('');

            document.getElementById('shop-list').innerHTML = shopItems.map(p => `
                <div class="card flex flex-col justify-between border-t-2 ${bal >= p.price ? 'border-emerald-500' : 'border-red-900 opacity-60'}">
                    <div><div class="text-3xl">${p.icon}</div><div class="font-black text-[10px] text-white uppercase">${p.name}</div><div class="text-[8px] text-emerald-400">+${p.income}/s</div></div>
                    <button onclick="buyProduct('${p.id}')" class="mt-4 py-2 border rounded text-[9px] font-black uppercase ${bal >= p.price ? 'bg-emerald-500 text-black border-emerald-500' : 'border-gray-800 text-gray-600'}">${p.price.toLocaleString()} PLN</button>
                </div>`).join('');

            document.getElementById('list-container').innerHTML = d.map(i => `
                <div class="card flex items-center gap-3 border-l-2 border-blue-500 bg-blue-500/5">
                    <div class="text-xl">${i.icon}</div>
                    <div><div class="text-[9px] font-black uppercase text-white">${i.name}</div><div class="text-[8px] text-blue-400">${(i.income * mult).toFixed(1)}/s</div></div>
                </div>`).join('');
        }

        function tradeStock(id, type) {
            const s = stockItems.find(x => x.id === id);
            let owned = getOwnedStocks();
            if (type === 'buy' && getBal() >= s.price) {
                setBal(getBal() - s.price);
                owned[id] = (owned[id] || 0) + 1;
                addLog(`NABYTO AKCJE: ${id}`, "log-success");
            } else if (type === 'sell' && owned[id] > 0) {
                setBal(getBal() + s.price);
                owned[id] -= 1;
                addLog(`SPRZEDANO AKCJE: ${id}`, "log-alert");
            }
            saveOwnedStocks(owned); updateUI();
        }

        function buyProduct(id) { 
            const p = shopItems.find(x => x.id === id); 
            if (getBal() >= p.price) { 
                const d = getData(); setBal(getBal() - p.price); 
                d.push({ ...p, currentPrice: p.price }); saveData(d); 
                addLog(`AKTYWACJA: ${p.name}`, "log-success"); updateUI(); 
            } 
        }

        function savePartner() {
            const n = document.getElementById('p-name').value, c = parseFloat(document.getElementById('p-commission').value);
            if (n && c > 0) {
                const d = getData(); d.push({ name: n.toUpperCase(), income: c, icon: '🤝', currentPrice: 0 });
                saveData(d); addLog(`KONTRAKT: ${n}`, "log-info"); closeModal('partner-modal'); updateUI();
            }
        }

        function saveQuickProduct() {
            const n = document.getElementById('pr-name').value, p = parseFloat(document.getElementById('pr-price').value), i = parseFloat(document.getElementById('pr-income').value);
            if (n && i > 0 && getBal() >= p) {
                const d = getData(); setBal(getBal() - p); d.push({ name: n.toUpperCase(), income: i, icon: '📦', currentPrice: p });
                saveData(d); addLog(`NOWY ZASÓB: ${n}`, "log-success"); closeModal('product-modal'); updateUI();
            }
        }

        function catchLead() { 
            if(currentLead) { 
                const d = getData(); d.push({ name: `LEAD: ${currentLead.name}`, income: currentLead.income, icon: '🔥', currentPrice: 0 }); 
                saveData(d); leadsCaught++; localStorage.setItem(LS_KEY + '_LC', leadsCaught);
                document.getElementById('lead-alert').style.display = 'none'; 
                addLog(`PRZEJĘTO LEAD!`, "log-alert"); currentLead = null; updateUI(); 
            } 
        }

        function executeTransfer() {
            const amt = getBal(); setBal(0); addLog(`TRANSFER ŚRODKÓW: ${Math.floor(amt)} PLN`, "log-alert");
            closeModal('transfer-modal'); updateUI();
        }

        function activatePrestige() {
            const bal = getBal();
            if (bal >= 100000000) {
                const bonus = (bal / 200000000);
                if (confirm(`RESET PRESTIŻU. Nowy mnożnik: x${(prestigeMultiplier + bonus).toFixed(2)}`)) {
                    localStorage.clear();
                    localStorage.setItem(LS_KEY + '_MULT', (prestigeMultiplier + bonus).toFixed(4));
                    location.reload();
                }
            } else { alert("Wymagane 100M PLN!"); }
        }

        setInterval(() => {
            const d = getData();
            const inc = d.reduce((s, i) => s + i.income, 0) * prestigeMultiplier;
            setBal(getBal() + inc);
            stockItems.forEach(s => s.price = Math.max(10, s.price * (1 + (Math.random() - 0.5) * s.fluctuation)));
            
            if (Math.random() < 0.03 && !currentLead) {
                currentLead = { name: "MODUŁ " + Math.floor(Math.random()*999), income: Math.floor(Math.random()*400)+200 };
                document.getElementById('lead-name').innerText = `${currentLead.name} (+${currentLead.income}/s)`;
                document.getElementById('lead-alert').style.display = 'block';
                setTimeout(() => { document.getElementById('lead-alert').style.display = 'none'; currentLead = null; }, 5000);
            }
            updateUI();
        }, 1000);

        function resetSystem() { if(confirm("CZYŚCIĆ SYSTEM?")) { localStorage.clear(); location.reload(); } }
        window.onload = () => { updateUI(); addLog("SYSTEM READY."); };
    </script>
</body>
</html>
